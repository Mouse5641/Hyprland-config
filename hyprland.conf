$terminal = kitty
$fileManager = nautilus
$menu = hyprlauncher
$mainMod = SUPER

source = monitors.conf
source = look.conf
source = input.conf
source = windowrules.conf
source = keybinds.conf

monitor=,preferred,auto,1

#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper & swaync & hyprpm reload -n
exec-once = hyprlock
exec-once = systemctl --user import-environment XDG_MENU_PREFIX
exec-once = dbus-update-activation-environment --systemd XDG_MENU_PREFIX
#exec-once = ~/.config/hypr/scripts/monitor-watch.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

